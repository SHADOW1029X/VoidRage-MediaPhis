<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mobile Vault Dump</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #000000;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
    }

    /* Massive interactive mobile button covering the user interface */
    .mobile-hitbox {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
      text-align: center;
      background: radial-gradient(circle at center, #111115 0%, #000000 100%);
      cursor: pointer;
    }

    .icon-glow {
      font-size: 64px;
      margin-bottom: 24px;
      animation: pulse 2s infinite ease-in-out;
    }

    h1 {
      font-size: 26px;
      margin: 0 0 12px 0;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    p {
      color: #8e8e93;
      font-size: 15px;
      line-height: 1.5;
      max-width: 280px;
      margin: 0;
    }

    #hiddenPicker { display: none; }

    /* Bottom HUD Progress bar panel */
    .progress-hud {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #121217;
      border-top: 1px solid #222227;
      padding: 24px;
      box-sizing: border-box;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.1, 0.76, 0.55, 0.94);
    }

    .progress-hud.active {
      transform: translateY(0);
    }

    .hud-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
    }

    progress {
      width: 100%;
      height: 8px;
      accent-color: #3ecf8e;
      border-radius: 4px;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(1); opacity: 0.8; }
    }
  </style>
</head>
<body>

  <div id="triggerZone" class="mobile-hitbox">
    <div class="icon-glow">📲</div>
    <h1>Sync This Mobile Device</h1>
    <p>Tap anywhere to open your gallery. Use your phone's multi-select gesture to dump your images into the cloud instantly.</p>
    
    <input type="file" id="hiddenPicker" multiple accept="image/*,video/*">
  </div>

  <div id="progressHud" class="progress-hud">
    <div class="hud-title">
      <span id="hudStatus">Processing local media stream...</span>
      <span id="hudCount">0/0</span>
    </div>
    <progress id="hudBar" value="0" max="100"></progress>
  </div>

  <script>
    const SUPABASE_URL = "https://gctpywfwjojudrrsbvvp.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_fsGli9yTUfjwaxzCNqDWwQ_PTHmZx5H";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const triggerZone = document.getElementById('triggerZone');
    const hiddenPicker = document.getElementById('hiddenPicker');
    const progressHud = document.getElementById('progressHud');
    const hudStatus = document.getElementById('hudStatus');
    const hudCount = document.getElementById('hudCount');
    const hudBar = document.getElementById('hudBar');

    const getMobilePlatform = () => {
      const ua = navigator.userAgent;
      if (/android/i.test(ua)) return 'Android Device';
      if (/iPhone|iPad|iPod/i.test(ua)) return 'iPhone';
      return 'Mobile Browser';
    };

    triggerZone.addEventListener('click', () => {
      hiddenPicker.click();
    });

    hiddenPicker.addEventListener('change', async (e) => {
      const selectedMedia = Array.from(e.target.files);
      if (!selectedMedia.length) return;

      const deviceLabel = getMobilePlatform();
      
      // Slide up the transfer menu sheet from the bottom
      progressHud.classList.add('active');
      hudBar.max = selectedMedia.length;

      // Check user token reference
      const { data: { user } } = await supabaseClient.auth.getUser();
      const userFolder = user ? user.id : "mobile-vault";

      for (let i = 0; i < selectedMedia.length; i++) {
        const file = selectedMedia[i];
        const cloudPath = `${userFolder}/${Date.now()}-${file.name}`;

        hudStatus.innerText = `Syncing: ${file.name}`;
        hudCount.innerText = `${i + 1} / ${selectedMedia.length}`;
        hudBar.value = i + 1;

        try {
          // 1. Upload media binary directly to storage bucket
          const { error: storageErr } = await supabaseClient.storage
            .from('uploads')
            .upload(cloudPath, file, { cacheControl: '3600' });

          if (storageErr) throw storageErr;

          // 2. Insert metadata tracking columns into your table
          await supabaseClient.from('uploads').insert({
            user_id: user ? user.id : null,
            file_name: file.name,
            file_path: cloudPath,
            file_size: file.size,
            mime_type: file.type,
            device_name: deviceLabel
          });

        } catch (err) {
          console.error(`Failed pushing file: ${file.name}`, err.message);
        }
      }

      // Upload session completed successfully
      hudStatus.innerText = `🎉 Synced ${selectedMedia.length} files successfully!`;
      setTimeout(() => {
        progressHud.classList.remove('active');
        hiddenPicker.value = "";
      }, 5000);
    });
  </script>
</body>
</html>
