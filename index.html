<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>One-Click Vault Synchronizer</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    :root {
      --bg-color: #0b0b0c;
      --card-bg: #131316;
      --accent-color: #3ecf8e;
      --border-color: #222225;
      --text-muted: #8a8a93;
    }

    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: var(--bg-color);
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
    }

    /* Full screen drop interface */
    .drop-wrapper {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 4px dashed transparent;
      box-sizing: border-box;
      transition: all 0.2s ease;
      position: relative;
    }

    .drop-wrapper.drag-over {
      border-color: var(--accent-color);
      background-color: rgba(62, 207, 142, 0.03);
    }

    .center-card {
      background: var(--card-bg);
      padding: 40px;
      border-radius: 16px;
      border: 1px solid var(--border-color);
      max-width: 440px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      z-index: 10;
    }

    h1 {
      font-size: 24px;
      margin: 0 0 10px 0;
      letter-spacing: -0.5px;
    }

    p {
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.6;
      margin: 0 0 30px 0;
    }

    .action-btn {
      background-color: var(--accent-color);
      color: #000000;
      border: none;
      padding: 16px 32px;
      font-size: 16px;
      font-weight: 700;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      transition: transform 0.1s ease, background 0.2s;
    }

    .action-btn:active { transform: scale(0.98); }
    .action-btn:disabled { background-color: #206b4a; color: #555; cursor: not-allowed; }

    /* Hidden inputs */
    #hiddenFileInput { display: none; }

    /* HUD style overlay status indicators */
    .hud-status {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(19, 19, 22, 0.9);
      backdrop-filter: blur(8px);
      padding: 14px 24px;
      border-radius: 30px;
      border: 1px solid var(--border-color);
      font-size: 14px;
      color: #fff;
      display: none;
      align-items: center;
      gap: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    progress {
      width: 120px;
      height: 6px;
      accent-color: var(--accent-color);
    }
  </style>
</head>
<body>

  <div id="dropWrapper" class="drop-wrapper">
    <div class="center-card">
      <div style="font-size: 48px; margin-bottom: 16px;">⚡</div>
      <h1>One-Click Media Sync</h1>
      <p id="instructionText">On mobile? Tap below to dump your gallery selections. On desktop? Simply drag and drop your whole photos folder directly onto this window.</p>
      
      <button id="triggerBtn" class="action-btn">Sync Device Media</button>
      <input type="file" id="hiddenFileInput" multiple accept="image/*,video/*,.heic">
    </div>

    <div id="hudStatus" class="hud-status">
      <span id="statusMessage">Analyzing local items...</span>
      <progress id="hudProgress" value="0" max="100"></progress>
    </div>
  </div>

  <script>
    // Configuration references matching your profile details
    const SUPABASE_URL = "https://gctpywfwjojudrrsbvvp.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_fsGli9yTUfjwaxzCNqDWwQ_PTHmZx5H";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const dropWrapper = document.getElementById('dropWrapper');
    const hiddenFileInput = document.getElementById('hiddenFileInput');
    const triggerBtn = document.getElementById('triggerBtn');
    const hudStatus = document.getElementById('hudStatus');
    const statusMessage = document.getElementById('statusMessage');
    const hudProgress = document.getElementById('hudProgress');

    // Auto fingerprint current client profile context
    const getDeviceFingerprint = () => {
      const ua = navigator.userAgent;
      if (/android/i.test(ua)) return 'Android Phone';
      if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) return 'iPhone/iPad';
      if (/Macintosh/i.test(ua)) return 'Macbook/Mac';
      if (/Windows/i.test(ua)) return 'Windows PC';
      return 'Synced Device';
    };

    // Main parallel processing function to ingest file list objects cleanly
    const streamFilesToVault = async (files) => {
      if (!files.length) return;

      // Check current auth status
      const { data: { user } } = await supabaseClient.auth.getUser();
      const userId = user ? user.id : "personal-vault"; // Fallback identifier since you are the sole user

      const deviceName = getDeviceFingerprint();

      // Lock UI controls & initialize background task notification panel
      triggerBtn.disabled = true;
      hudStatus.style.display = 'flex';
      hudProgress.max = files.length;

      for (let i = 0; i < files.length; i++) {
        const currentFile = files[i];
        
        // Skip hidden/system files
        if (currentFile.name.startsWith('.')) continue;

        // Structured storage routing matching our schema logic
        const uniqueStoragePath = `${userId}/${Date.now()}-${currentFile.name}`;

        statusMessage.innerText = `Syncing [${i + 1}/${files.length}]: ${currentFile.name}`;
        hudProgress.value = i + 1;

        try {
          // 1. Stream asset payload straight into 'uploads' storage bucket
          const { error: storageErr } = await supabaseClient.storage
            .from('uploads')
            .upload(uniqueStoragePath, currentFile, { cacheControl: '3600' });

          if (storageErr) throw storageErr;

          // 2. Insert metadata logs into the matching database schema table
          const { error: dbErr } = await supabaseClient
            .from('uploads')
            .insert({
              user_id: user ? user.id : null,
              file_name: currentFile.name,
              file_path: uniqueStoragePath,
              file_size: currentFile.size,
              mime_type: currentFile.type,
              device_name: deviceName
            });

          if (dbErr) throw dbErr;

        } catch (err) {
          console.error(`Error processing file ${currentFile.name}:`, err.message);
        }
      }

      // Restore baseline state
      statusMessage.innerText = `🎉 Successfully synced ${files.length} files from ${deviceName}!`;
      triggerBtn.disabled = false;
      setTimeout(() => { hudStatus.style.display = 'none'; }, 4000);
    };

    // --- INTERACTION CHANNEL 1: MOBILE TAP ---
    triggerBtn.addEventListener('click', () => {
      hiddenFileInput.click(); // Instantly displays system photo pool grid overlay
    });

    hiddenFileInput.addEventListener('change', (e) => {
      const selectedFiles = Array.from(e.target.files);
      streamFilesToVault(selectedFiles);
    });

    // --- INTERACTION CHANNEL 2: DESKTOP DRAG & DROP ---
    window.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropWrapper.classList.add('drag-over');
    });

    window.addEventListener('dragleave', () => {
      dropWrapper.classList.remove('drag-over');
    });

    window.addEventListener('drop', (e) => {
      e.preventDefault();
      dropWrapper.classList.remove('drag-over');
      
      const droppedFiles = Array.from(e.dataTransfer.files);
      streamFilesToVault(droppedFiles);
    });
  </script>
</body>
</html>
