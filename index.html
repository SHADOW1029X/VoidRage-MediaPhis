<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Folder Auto-Sync Test</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background: #121212; color: #fff; font-family: sans-serif; padding: 40px; text-align: center; }
    .box { max-width: 500px; margin: 0 auto; background: #1e1e1e; padding: 30px; border-radius: 8px; border: 1px solid #333; }
    .btn { background: #3ecf8e; color: #000; border: none; padding: 12px 24px; font-weight: bold; border-radius: 4px; cursor: pointer; width: 100%; }
    #log { margin-top: 20px; text-align: left; font-family: monospace; color: #aaa; max-height: 200px; overflow-y: auto; background: #000; padding: 10px; border-radius: 4px; }
  </style>
</head>
<body>

  <div class="box">
    <h2>Select Local Backup Folder</h2>
    <p>Select a folder once. The app will automatically scan all media files inside it and sync them to Supabase.</p>
    <button id="syncBtn" class="btn">Select Folder & Sync Assets</button>
    <div id="log">Logs will appear here...</div>
  </div>

  <script>
    const SUPABASE_URL = "https://gctpywfwjojudrrsbvvp.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_fsGli9yTUfjwaxzCNqDWwQ_PTHmZx5H";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const syncBtn = document.getElementById('syncBtn');
    const logDiv = document.getElementById('log');

    function log(msg) {
      logDiv.innerHTML += `<div>> ${msg}</div>`;
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    syncBtn.addEventListener('click', async () => {
      // 1. Verify Browser Support
      if (!window.showDirectoryPicker) {
        alert("Your browser doesn't support the File System Access API. Please use desktop Chrome or Edge.");
        return;
      }

      try {
        // 2. User grants explicit permission to a specific local folder
        log("Opening folder selection permission prompt...");
        const dirHandle = await window.showDirectoryPicker();
        
        log(`Permission granted for folder: [${dirHandle.name}]`);
        syncBtn.disabled = true;

        // 3. Automatically iterate files inside the folder recursively
        for await (const entry of dirHandle.values()) {
          if (entry.kind === 'file') {
            const file = await entry.getFile();
            
            // Filter out non-media assets
            if (file.type.startsWith('image/') || file.type.startsWith('video/')) {
              log(`Found asset: ${file.name} (${(file.size/1024/1024).toFixed(2)} MB)`);
              
              const uniquePath = `sandbox/${Date.now()}-${file.name}`;

              // Upload binary to Supabase
              const { error: storageErr } = await supabaseClient.storage
                .from('uploads')
                .upload(uniquePath, file, { cacheControl: '3600' });

              if (!storageErr) {
                // Insert DB Metadata entry 
                await supabaseClient.from('uploads').insert({
                  file_name: file.name,
                  file_path: uniquePath,
                  file_size: file.size,
                  mime_type: file.type,
                  device_name: "Desktop Sync Folder"
                });
                log(`✅ Successfully synced: ${file.name}`);
              } else {
                log(`❌ Error uploading ${file.name}: ${storageErr.message}`);
              }
            }
          }
        }
        log("🎉 Finished auto-scanning folder contents!");
      } catch (err) {
        log(`Process aborted or failed: ${err.message}`);
      } finally {
        syncBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
