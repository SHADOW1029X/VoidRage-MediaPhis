<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>One-Click Select All Sync</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    :root {
      --bg-color: #0b0b0c;
      --card-bg: #131316;
      --accent-color: #3ecf8e;
      --border-color: #222225;
      --text-muted: #8a8a93;
    }

    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: var(--bg-color);
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .center-card {
      background: var(--card-bg);
      padding: 40px;
      border-radius: 16px;
      border: 1px solid var(--border-color);
      max-width: 440px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    }

    h1 { font-size: 24px; margin: 0 0 10px 0; }
    p { color: var(--text-muted); font-size: 14px; line-height: 1.6; margin: 0 0 30px 0; }

    .action-btn {
      background-color: var(--accent-color);
      color: #000000;
      border: none;
      padding: 16px 32px;
      font-size: 16px;
      font-weight: 700;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
    }

    .action-btn:disabled { background-color: #206b4a; color: #555; cursor: not-allowed; }
    #hiddenFileInput { display: none; }

    /* Shortcut Guide Tip Box */
    .tip-box {
      background: #1a1a1f;
      border: 1px solid #333;
      padding: 12px;
      border-radius: 6px;
      margin-top: 20px;
      font-size: 13px;
      color: #3ecf8e;
      display: none;
    }

    .status-hud {
      margin-top: 20px;
      font-size: 14px;
      color: var(--text-muted);
      display: none;
    }
    progress { width: 100%; accent-color: var(--accent-color); margin-top: 8px; }
  </style>
</head>
<body>

  <div class="center-card">
    <div style="font-size: 44px; margin-bottom: 12px;">📂</div>
    <h1>Bulk Media Synchronizer</h1>
    <p>Click below to open your device storage. Use your device's "Select All" shortcut to dump everything instantly into your vault.</p>
    
    <button id="triggerBtn" class="action-btn">Select All & Upload</button>
    <input type="file" id="hiddenFileInput" multiple accept="image/*,video/*,.heic">

    <div id="tipBox" class="tip-box"></div>

    <div id="statusHud" class="status-hud">
      <span id="statusMessage">Uploading...</span>
      <progress id="uploadProgress" value="0" max="100"></progress>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://gctpywfwjojudrrsbvvp.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_fsGli9yTUfjwaxzCNqDWwQ_PTHmZx5H";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const hiddenFileInput = document.getElementById('hiddenFileInput');
    const triggerBtn = document.getElementById('triggerBtn');
    const tipBox = document.getElementById('tipBox');
    const statusHud = document.getElementById('statusHud');
    const statusMessage = document.getElementById('statusMessage');
    const uploadProgress = document.getElementById('uploadProgress');

    // Detect device platform to provide the exact shortcut hint
    const getSelectAllHint = () => {
      const ua = navigator.userAgent;
      if (/Macintosh/i.test(ua)) return "💡 Mac Tip: Press <b>Cmd + A</b> to select all files instantly!";
      if (/Windows/i.test(ua)) return "💡 Windows Tip: Press <b>Ctrl + A</b> to select all files instantly!";
      if (/iPhone|iPad|iPod/i.test(ua)) return "💡 iOS Tip: Tap the <b>( ... )</b> icon in the top right, tap 'Select', then drag across your items!";
      if (/android/i.test(ua)) return "💡 Android Tip: Long-press the first item, then tap the 'Select All' checkbox at the top!";
      return "💡 Quick Tip: Use your browser's native Select All tool to grab your whole media catalog!";
    };

    triggerBtn.addEventListener('click', () => {
      // 1. Show the device shortcut tip box right as the window triggers
      tipBox.innerHTML = getSelectAllHint();
      tipBox.style.display = 'block';

      // 2. Open the file selection panel
      hiddenFileInput.click();
    });

    hiddenFileInput.addEventListener('change', async (e) => {
      const files = Array.from(e.target.files);
      if (!files.length) {
        tipBox.style.display = 'none';
        return;
      }

      // Hide tip box and bring up the transfer progress bar
      tipBox.style.display = 'none';
      triggerBtn.disabled = true;
      statusHud.style.display = 'block';
      uploadProgress.max = files.length;

      const { data: { user } } = await supabaseClient.auth.getUser();
      const userId = user ? user.id : "shared-vault";

      // 3. Process the entire chunk automatically in the background
      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        if (file.name.startsWith('.')) continue;

        const uniquePath = `${userId}/${Date.now()}-${file.name}`;
        statusMessage.innerText = `Syncing (${i + 1}/${files.length}): ${file.name}`;
        uploadProgress.value = i + 1;

        try {
          // Push binary directly to your bucket
          const { error: storageErr } = await supabaseClient.storage
            .from('uploads')
            .upload(uniquePath, file, { cacheControl: '3600' });

          if (storageErr) throw storageErr;

          // Record metadata entries inside your table schema
          await supabaseClient.from('uploads').insert({
            user_id: user ? user.id : null,
            file_name: file.name,
            file_path: uniquePath,
            file_size: file.size,
            mime_type: file.type
          });

        } catch (err) {
          console.error(`Upload tracking fault on ${file.name}:`, err.message);
        }
      }

      statusMessage.innerText = `🎉 Successfully backed up all ${files.length} selected items!`;
      triggerBtn.disabled = false;
      hiddenFileInput.value = ""; // Reset input tracking state
    });
  </script>
</body>
</html>
